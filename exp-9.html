<!DOCTYPE html>
<html>
<head>
<title>Built-in Objects</title>
</head>
<body>

<script>
let today = new Date();

document.write("Current Date: " + today + "<br>");
document.write("Square Root of 64: " + Math.sqrt(64) + "<br>");
document.write("Random Number: " + Math.random() + "<br>");

let name = "JavaScript";
document.write("Upper Case: " + name.toUpperCase());
</script>

</body>
</html>
